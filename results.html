<!DOCTYPE html>
<html lang="pt-BR">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Histórico de Resultados</title>
	<link rel="stylesheet" type="text/css" href="./assets/bootstrap.min.css">
	<link rel="stylesheet" type="text/css" href="./assets/app.css">
</head>

<body class="home2">
	<div id="resultsSection" class="sec-spacer" style="padding: 40px 0px;">
		<div class="container">
			<div class="row justify-content-center">
				<div class="col-12 col-md-10 col-lg-8">
					<div class="card exam-question-card">
						<div class="card-header text-white bg-primary">
							<div class="d-flex justify-content-between align-items-center">
								<span>Histórico de Resultados</span>
								<button id="backBtn" class="btn btn-light btn-sm">← Voltar</button>
							</div>
						</div>
						<div class="card-body">
							<div id="resultsContainer">
								<p class="text-muted text-center">Carregando resultados...</p>
							</div>
						</div>
						<div class="card-footer text-center">
							<button id="clearBtn" class="btn btn-danger btn-sm">Limpar Histórico</button>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script>
		// Função para formatar a data
		function formatDate(timestamp) {
			const date = new Date(timestamp);
			return date.toLocaleString('pt-BR', {
				day: '2-digit',
				month: '2-digit',
				year: 'numeric',
				hour: '2-digit',
				minute: '2-digit',
				second: '2-digit'
			});
		}

		// Função para carregar e exibir os resultados
		function loadResults() {
			const resultsContainer = document.getElementById('resultsContainer');
			const results = JSON.parse(localStorage.getItem('quizResults') || '[]');

			if (results.length === 0) {
				resultsContainer.innerHTML = '<p class="text-muted text-center">Nenhum resultado salvo ainda.</p>';
				return;
			}

			// Ordenar resultados por data (mais recentes primeiro)
			results.sort((a, b) => b.timestamp - a.timestamp);

			let html = `
				<div class="table-responsive">
					<table class="table table-striped table-hover">
						<thead class="table-primary">
							<tr>
								<th>Data/Hora</th>
								<th>Acertos</th>
								<th>Erros</th>
								<th>Não Respondidas</th>
								<th>Aproveitamento</th>
								<th>Acertos %</th>
								<th>Erros %</th>
							</tr>
						</thead>
						<tbody>
			`;

			results.forEach((result, index) => {
				const resultColor = result.score >= 70 ? 'success' : result.score >= 50 ? 'warning' : 'danger';
				html += `
					<tr class="align-middle">
						<td>${formatDate(result.timestamp)}</td>
						<td><strong>${result.totalCorrectAnswers}</strong></td>
						<td><strong>${result.totalIncorrectAnswers}</strong></td>
						<td><strong>${result.unansweredQuestions}</strong></td>
						<td>
							<span class="badge bg-${resultColor}">
								${result.score}%
							</span>
						</td>
						<td>
							<span class="text-success">
								${result.correctPercentage}%
							</span>
						</td>
						<td>
							<span class="text-danger">
								${result.incorrectPercentage}%
							</span>
						</td>
					</tr>
				`;
			});

			// Calcular estatísticas gerais
			const totalTests = results.length;
			const averageScore = Math.round(results.reduce((sum, r) => sum + r.score, 0) / totalTests);
			const bestScore = Math.max(...results.map(r => r.score));
			const worstScore = Math.min(...results.map(r => r.score));

			html += `
						</tbody>
					</table>
				</div>

				<hr>

				<div class="row mt-4">
					<div class="col-md-6">
						<div class="card border-primary">
							<div class="card-header bg-primary text-white">
								<strong>Estatísticas Gerais</strong>
							</div>
							<div class="card-body">
								<p>
									<strong>Total de Testes:</strong> ${totalTests}
								</p>
								<p>
									<strong>Aproveitamento Médio:</strong>
									<span class="badge bg-info">${averageScore}%</span>
								</p>
								<p>
									<strong>Melhor Desempenho:</strong>
									<span class="badge bg-success">${bestScore}%</span>
								</p>
								<p>
									<strong>Pior Desempenho:</strong>
									<span class="badge bg-warning">${worstScore}%</span>
								</p>
							</div>
						</div>
					</div>
				</div>
			`;

			resultsContainer.innerHTML = html;
		}

		// Função para limpar o histórico
		function clearResults() {
			if (confirm('Tem certeza que deseja limpar todo o histórico de resultados?')) {
				localStorage.removeItem('quizResults');
				loadResults();
				alert('Histórico limpo com sucesso!');
			}
		}

		// Função para voltar à página inicial
		function goBack() {
			window.location.href = 'index.html';
		}

		// Event listeners
		document.getElementById('backBtn').addEventListener('click', goBack);
		document.getElementById('clearBtn').addEventListener('click', clearResults);

		// Carregar resultados ao inicializar a página
		document.addEventListener('DOMContentLoaded', loadResults);
	</script>
</body>

</html>
